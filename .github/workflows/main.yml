name: '📦 حرفه‌ای: دانلود و ذخیره در مخزن (ماتریس)'

on:
  workflow_dispatch:
    inputs:
      file_urls:
        description: '🔗 لینک‌ها (کاما یا newline)'
        required: true
        type: string

      download_type:
        description: '💾 نوع ذخیره'
        required: false
        type: choice
        options: [direct, zip]
        default: direct

      password:
        description: '🔐 رمز zip'
        required: false
        type: string
        default: ''

      split_size:
        description: '📦 حجم هر پارت'
        required: false
        type: string
        default: '95m'

      commit_batch_size:
        description: '📦 هر چند فایل یک commit شود'
        required: false
        type: number
        default: 1

permissions:
  contents: write

# -----------------------------------------
# 1️⃣ ساخت ماتریس
# -----------------------------------------
jobs:
  create-matrix:
    runs-on: ubuntu-latest
    outputs:
      urls: ${{ steps.json.outputs.urls }}

    steps:
      - name: parse input
        id: json
        run: |
          raw=$(echo "${{ github.event.inputs.file_urls }}" | tr ',' '\n' | tr -d ' ')
          arr=$(printf '%s\n' "$raw" | jq -R -s -c 'split("\n") | map(select(length>0))')
          echo "urls=$arr" >> "$GITHUB_OUTPUT"

# -----------------------------------------
# 2️⃣ دانلود موازی + artifact
# -----------------------------------------
  download:
    needs: create-matrix
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        url: ${{ fromJson(needs.create-matrix.outputs.urls) }}

    steps:
      - uses: actions/checkout@v4

      - name: install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full file jq

      - name: download file
        run: |
          URL="${{ matrix.url }}"
          echo "Downloading: $URL"

          if ! curl -L --fail --retry 5 --retry-delay 5 -o file "$URL"; then
            echo "::warning::Download failed"
            exit 1
          fi

          RAW_NAME=$(basename "$URL" | sed 's/\?.*//' | sed 's/%20/ /g')
          [ -z "$RAW_NAME" ] && RAW_NAME="file_$(date +%s)"

          SAFE_NAME=$(echo "$RAW_NAME" | sed 's/[\\/:*?"<>|]/_/g')

          mkdir -p out

          if [[ "${{ github.event.inputs.download_type }}" == "direct" ]]; then
            mv file "out/$SAFE_NAME"
          else
            if [ -z "${{ github.event.inputs.password }}" ]; then
              7z a -mx=3 -v${{ github.event.inputs.split_size }} "out/${SAFE_NAME}.7z" file
            else
              7z a -p"${{ github.event.inputs.password }}" -mx=3 -v${{ github.event.inputs.split_size }} "out/${SAFE_NAME}.7z" file
            fi
            rm file
          fi

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: file-${{ strategy.job-index }}
          path: out/

# -----------------------------------------
# 3️⃣ commit گروهی با batching
# -----------------------------------------
  commit:
    needs: download
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          path: temp

      - name: organize files
        run: |
          mkdir -p downloads/all
          find temp -type f -exec mv {} downloads/all/ \;

      - name: batch commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BATCH=${{ github.event.inputs.commit_batch_size }}

          cd downloads/all

          FILES=(*)
          TOTAL=${#FILES[@]}

          echo "Total files: $TOTAL"
          echo "Batch size: $BATCH"

          cd ../../

          INDEX=0

          while [ $INDEX -lt $TOTAL ]; do
            COUNT=0

            while [ $COUNT -lt $BATCH ] && [ $INDEX -lt $TOTAL ]; do
              FILE="${FILES[$INDEX]}"
              git add "downloads/all/$FILE"

              INDEX=$((INDEX+1))
              COUNT=$((COUNT+1))
            done

            git commit -m "Add batch of $COUNT files"
            git push
          done
